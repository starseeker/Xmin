[[source]]
name = "xorg-server"
revision = "21.1.23"
url = "https://www.x.org/releases/individual/xserver/"
archive = "xorg-server-21.1.23.tar.xz"
sha256 = "e39832e5617dadaf072fdf9f0e19e5d2e1c2a13607ac280bac1aba9f8fe14634"
signature_key = "3C2C43D9447D5938EF4551EBE23B7E70B467F0BF"
signature_verified = false
signature_note = "Detached signature present; release public key was unavailable in the import environment."
status = "partial"
local_path = "third_party/xorg-server"
retained_paths = [
  "include/*.h",
  "Xext/bigreq.c, geext.c, saver.c, shape.c, sleepuntil.c, sync.c, xcmisc.c, and xtest.c (unconditional baseline plus MIT-SCREEN-SAVER)",
  "Xext/shm.c (conditional MIT-SHM implementation)",
  "Xext/geext.h, geint.h, hashtable.c, hashtable.h, shmint.h, sleepuntil.h, syncsdk.h, syncsrv.h, and xace.h",
  "Xi/*.c and Xi/*.h for the complete upstream srcs_xi implementation plus stubs.c virtual-server DDX hooks",
  "xkb/*.c from upstream srcs_xkb plus xkb.h, xkbDflts.h, and xkbgeom.h; ddxLoad.c, maprules.c, xkbtext.c, xkbfmisc.c, and xkbout.c are retained for provenance but replaced or excluded from the Xmin target",
  "dix/*.c excluding stubmain.c (complete upstream srcs_dix list)",
  "dix/dispatch.h and dix/enterleave.h",
  "fb/*.c and fb/*.h (complete upstream srcs_fb implementation)",
  "hw/vfb/InitInput.c, hw/vfb/InitOutput.c, and hw/vfb/man/Xvfb.man",
  "mi/*.c and mi/*.h for the complete upstream srcs_mi implementation plus miinitext.c static extension registry",
  "miext/damage/damage.c, damage.h, and damagestr.h (complete upstream srcs_miext_damage implementation)",
  "miext/sync/misync.c, misyncfd.c, misync.h, misyncfd.h, and misyncstr.h (complete non-DRI upstream implementation; excludes misyncshm)",
  "randr/*.c and randr/*.h for the complete upstream srcs_randr implementation plus the rrxinerama.c single-screen compatibility adapter",
  "render/*.c and render/*.h for the complete upstream srcs_render implementation",
  "damageext/damageext.c and damageextint.h (complete upstream srcs_damageext implementation)",
  "glx/*.c and glx/*.h for the complete non-DRI indirect GLX protocol dispatcher and in-server vendor router; excludes glxdriswrast.c, glxdricommon.c, and glxdri2.c in favor of src/glx/xmin_glx_osmesa.c",
  "xfixes/*.c, xfixes.h, and xfixesint.h (complete upstream srcs_xfixes implementation)",
  "present/*.c, present.h, presentext.h, and present_priv.h (complete upstream srcs_present implementation; Xmin uses its software fake-vblank mode)",
  "composite/*.c, compint.h, and compositeext.h (complete upstream srcs_composite implementation)",
  "dbe/dbe.c, midbe.c, dbestruct.h, and midbe.h (complete upstream MI DOUBLE-BUFFER implementation)",
  "os/WaitFor.c, access.c, auth.c, backtrace.c (portable no-op branch), client.c, connection.c, inputthread.c (disabled-mode stubs), io.c, log.c, mitauth.c, oscolor.c, osinit.c, ospoll.c, utils.c, xprintf.c, and xstrans.c",
  "os/osdep.h and os/ospoll.h",
  "os/xserver_poll.c plus portable libc fallbacks, selected by CMake probes",
]
license_paths = ["LICENSES/xorg-server/COPYING"]
patches = [
  "patches/xorg-server/0001-omit-network-si-hosts-without-tcp.patch",
  "patches/xorg-server/0002-vfb-xmin-defaults-and-cleanup.patch",
  "patches/xorg-server/0003-vfb-xmin-device-names.patch",
  "patches/xorg-server/0004-randr-xinerama-without-panoramix.patch",
  "patches/xorg-server/0005-skip-absent-tcp-xtrans.patch",
  "patches/xorg-server/0006-enable-xmin-indirect-glx.patch",
  "patches/xorg-server/0007-lock-dynamic-display-allocation.patch",
]
importer = "tools/import-xorg.sh"

